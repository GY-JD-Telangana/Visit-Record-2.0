<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            green: '#006430',
                            gold: '#FFCC00',
                            dark: '#111827'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for beautiful floating select lists */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Custom transitions for radio buttons styled as clickable tiles */
        .tile-radio:checked + div {
            border-color: #006430;
            background-color: #f0fdf4;
            box-shadow: 0 0 0 2px rgba(0, 100, 48, 0.15);
        }
        .tile-radio:checked + div svg {

        }
    </style>

    <script>
        function showToast(message, type = "error") {
            const toast = document.getElementById("toast");
            const toastMsg = document.getElementById("toast-message");
            
            toastMsg.textContent = message;
            if (type === "success") {
                toast.classList.remove("border-rose-800", "text-rose-200");
                toast.classList.add("border-emerald-700", "text-emerald-300");
            } else {
                toast.classList.remove("border-emerald-700", "text-emerald-300");
                toast.classList.add("border-rose-800", "text-rose-200");
            }

            toast.classList.remove("opacity-0", "pointer-events-none", "translate-y-10");
            toast.classList.add("opacity-100", "pointer-events-auto", "translate-y-0");

            setTimeout(hideToast, 5000);
        }

        function hideToast() {
            const toast = document.getElementById("toast");
            toast.classList.remove("opacity-100", "pointer-events-auto", "translate-y-0");
            toast.classList.add("opacity-0", "pointer-events-none", "translate-y-10");
        }

        function showErrorLocation(error) {

            switch (error.code) {
                case error.PERMISSION_DENIED:
                    message = "Please enable Location Access to submit details.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = "Location telemetry unavailable.";

                case error.TIMEOUT:
                    message = "Location verification timed out.";
                    break;
            }
            showToast(message);
            document.getElementById("submit-button").disabled = true;
        }

        function parseCSV(text) {
            const lines = [];
            let row = [""];
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                const next = text[i + 1];
                if (c === '"') {
                    if (inQuotes && next === '"') {
                        row[row.length - 1] += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (c === ',' && !inQuotes) {
                    row.push('');
                } else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') {
                        i++;
                    }
                    lines.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.length > 1 || row[0] !== '') {
                lines.push(row);
            }
            return lines;
        }

        async function fetchCustomerDetails() {
            const phoneInput = document.getElementById("contactInfo");
            const phone = phoneInput.value.trim();
            const statusDiv = document.getElementById("fetch-status");
            const fetchBtn = document.getElementById("fetch-customer-btn");

            if (phone.length < 10) {
                showToast("Please enter a valid 10-digit phone number first.");
                return;
            }

            statusDiv.style.color = "#0056b3";
            statusDiv.textContent = "Fetching details...";
            fetchBtn.disabled = true;

            try {
                const csvUrl = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ5XPG5xNDSkli3nYtaQvYvr64VVqwk2dQli6RAJy1uBTnWVi-rjAmaGvFn3gu81CqSRdZ0Ys8JHua/pub?gid=1139281938&single=true&output=csv&t=${Date.now()}`;

                const response = await fetch(csvUrl, {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'omit'
                });

                if (!response.ok) {
                    throw new Error("HTTP response status: " + response.status);
                }

                const csvText = await response.text();
                const rows = parseCSV(csvText);

                if (!rows || rows.length === 0) {
                    throw new Error("Empty spreadsheet retrieved.");
                }

                const headers = rows[0];

                let phoneColIdx = -1, nameColIdx = -1, districtColIdx = -1, mandalColIdx = -1, villageColIdx = -1;

                headers.forEach((header, idx) => {
                    const label = (header || "").toLowerCase().trim();
                    if (label.includes("phone") || label.includes("contact") || label.includes("mobile") || label.includes("number")) {
                        phoneColIdx = idx;
                    } else if (label.includes("customer") || label.includes("name") || label.includes("farmer")) {
                        if (!label.includes("father") && !label.includes("dse")) {
                            nameColIdx = idx;
                        }
                    } else if (label.includes("district") || label.includes("జిల్లా") || label.includes("dist")) {
                        districtColIdx = idx;
                    } else if (label.includes("mandal") || label.includes("మండలం") || label.includes("subcategory") || label.includes("mnd")) {
                        mandalColIdx = idx;
                    } else if (label.includes("village") || label.includes("గ్రామం") || label.includes("vlg")) {
                        villageColIdx = idx;
                    }
                });

                if (phoneColIdx === -1) phoneColIdx = 0; 
                if (nameColIdx === -1) nameColIdx = 1;
                if (districtColIdx === -1) districtColIdx = 2;
                if (mandalColIdx === -1) mandalColIdx = 3;
                if (villageColIdx === -1) villageColIdx = 4;

                let matchedRow = null;
                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i];
                    if (!cells || cells.length <= phoneColIdx) continue;

                    let cleanedRowPhone = String(cells[phoneColIdx] || "").trim().replace(/[^0-9]/g, '');
                    let cleanedInputPhone = phone.replace(/[^0-9]/g, '');

                    if (cleanedRowPhone.length === 12 && cleanedRowPhone.startsWith('91')) {
                        cleanedRowPhone = cleanedRowPhone.substring(2);
                    }
                    if (cleanedInputPhone.length === 12 && cleanedInputPhone.startsWith('91')) {
                        cleanedInputPhone = cleanedInputPhone.substring(2);
                    }

                    if (cleanedRowPhone === cleanedInputPhone || String(cells[phoneColIdx]).trim() === phone) {
                        matchedRow = cells;
                        break;
                    }
                }

                if (!matchedRow) {
                    statusDiv.style.color = "peru";
                    statusDiv.textContent = "No existing record found. Fill manually.";
                    fetchBtn.disabled = false;
                    return;
                }

                const customerName = matchedRow[nameColIdx] ? String(matchedRow[nameColIdx]).trim() : "";
                const district = matchedRow[districtColIdx] ? String(matchedRow[districtColIdx]).trim() : "";
                const mandal = matchedRow[mandalColIdx] ? String(matchedRow[mandalColIdx]).trim() : "";
                const village = matchedRow[villageColIdx] ? String(matchedRow[villageColIdx]).trim() : "";

                if (customerName) {
                    document.getElementById("customerName").value = customerName;
                }

                if (district) {
                    const districtSelect = document.getElementById("district");
                    let optionExists = false;
                    for (let i = 0; i < districtSelect.options.length; i++) {
                        if (districtSelect.options[i].value.toLowerCase().trim() === district.toLowerCase().trim()) {
                            districtSelect.selectedIndex = i;
                            optionExists = true;
                            break;
                        }
                    }
                    if (!optionExists) {
                        const opt = document.createElement("option");
                        opt.value = district;
                        opt.textContent = district;
                        districtSelect.appendChild(opt);
                        districtSelect.value = district;
                        if (!mandals[district]) {
                            mandals[district] = [];
                        }
                    }
                    updateMandals(); 
                }

                if (mandal) {
                    const mandalSelect = document.getElementById("subcategory");
                    let optionExists = false;
                    for (let i = 0; i < mandalSelect.options.length; i++) {
                        if (mandalSelect.options[i].value.toLowerCase().trim() === mandal.toLowerCase().trim()) {
                            mandalSelect.selectedIndex = i;
                            optionExists = true;
                            break;
                        }
                    }
                    if (!optionExists) {
                        const opt = document.createElement("option");
                        opt.value = mandal;
                        opt.textContent = mandal;
                        mandalSelect.appendChild(opt);
                        mandalSelect.value = mandal;
                        const currentDistrict = document.getElementById("district").value;
                        if (currentDistrict) {
                            if (!mandals[currentDistrict]) {
                                mandals[currentDistrict] = [];
                            }
                            if (!mandals[currentDistrict].includes(mandal)) {
                                mandals[currentDistrict].push(mandal);
                            }
                        }
                        if (!villages[mandal]) {
                            villages[mandal] = [];
                        }
                    }
                    updateVillages(); 
                }

                if (village) {
                    const villageSelect = document.getElementById("village");
                    let optionExists = false;
                    for (let i = 0; i < villageSelect.options.length; i++) {
                        if (villageSelect.options[i].value.toLowerCase().trim() === village.toLowerCase().trim()) {
                            villageSelect.selectedIndex = i;
                            optionExists = true;
                            break;
                        }
                    }
                    if (!optionExists) {
                        const opt = document.createElement("option");
                        opt.value = village;
                        opt.textContent = village;
                        villageSelect.appendChild(opt);
                        villageSelect.value = village;
                        const currentMandal = document.getElementById("subcategory").value;
                        if (currentMandal) {
                            if (!villages[currentMandal]) {
                                villages[currentMandal] = [];
                            }
                            if (!villages[currentMandal].includes(village)) {
                                villages[currentMandal].push(village);
                            }
                        }
                    }
                }

                statusDiv.style.color = "green";
                statusDiv.textContent = "Filled successfully!";
                showToast("Found customer Data!", "success");
                setTimeout(() => { statusDiv.textContent = ""; }, 4000);

            } catch (err) {
                console.error("Prefill Error:", err);
                statusDiv.style.color = "red";
                statusDiv.textContent = "Prefill failure. Fill manually.";
            } finally {
                fetchBtn.disabled = false;
            }
        }

                mode: "no-cors", 
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            }).then(() => {
                showToast("Your field visit is now successfully recorded!", "success");
                document.querySelector("form").reset();
                getLocation(); 
            }).catch(error => {
                console.error("Submission error:", error);
                showToast("Failed to upload visit. Please try again.");
            }).finally(() => {
                submitBtn.disabled = false;
                spinner.classList.add("hidden");
                btnText.textContent = "Record Visit Details";
            });
        }

        window.onload = function () {
            // Start the Geolocation triggers on window load.
            document.getElementById("submit-button").disabled = true;
            getLocation();
        }
    </script>
</body>
</html>
